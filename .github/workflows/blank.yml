name: Build Android APK

# 触发条件
on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发
  pull_request:
    branches: [ "main", "master" ] # 当提交 PR 到这些分支时触发
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发构建

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (现代 Android 项目通常使用 Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 自动缓存 Gradle 依赖，加快后续构建速度

      # 3. 赋予 Gradle 包装器执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行构建命令 (这里构建 Debug 版本的 APK)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. 将构建好的 APK 作为 Artifact 上传，以便下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # 请根据实际的项目模块名称调整路径，默认通常是 app/...
          path: app/build/outputs/apk/debug/*.apk
